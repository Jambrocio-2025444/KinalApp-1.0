<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/menu :: main}">

<th:block th:fragment="content">
  <div class="page-header">
    <h2><i class="bi bi-search"></i> Resultado de Búsqueda</h2>
    <div>
      <a href="/detalles" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Volver
      </a>
      <a href="/detalles/BuscarDetalle" class="btn btn-primary">
        <i class="bi bi-search"></i> Nueva Búsqueda
      </a>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div th:if="${encontrado == true}">
        <h3 class="text-success mb-3">
          <i class="bi bi-check-circle-fill"></i> Detalle de venta encontrado:
        </h3>
        <div class="table-responsive">
          <table class="table">
            <tbody>
            <tr>
              <th width="150">Código:</th>
              <td th:text="${detalle.codigoDetalleVenta}">—</td>
            </tr>
            <tr>
              <th>Venta:</th>
              <td th:text="${detalle.ventas.codigoVenta}">—</td>
            </tr>
            <tr>
              <th>Producto:</th>
              <td th:text="${detalle.producto.nombreProducto}">—</td>
            </tr>
            <tr>
              <th>Cantidad:</th>
              <td th:text="${detalle.cantidad}">—</td>
            </tr>
            <tr>
              <th>Precio Unitario:</th>
              <td th:text="${detalle.precioUnitario}">—</td>
            </tr>
            <tr>
              <th>Subtotal:</th>
              <td th:text="${detalle.subtotal}">—</td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div th:if="${encontrado == false}" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${mensaje}"></span>
      </div>
    </div>
  </div>
</th:block>

</html>
