<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/menu :: main}">

<th:block th:fragment="content">
    <div class="page-header">
        <h2><i class="bi bi-check-circle"></i> Productos Activos</h2>
        <a href="/productos" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Todos los productos
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="producto : ${producto}">
                        <td th:text="${producto.codigoProducto}">Código</td>
                        <td th:text="${producto.nombreProducto}">Nombre</td>
                        <td th:text="${producto.precio}">Precio</td>
                        <td th:text="${producto.stock}">Stock</td>
                        <td><span class="badge bg-success">Activo</span></td>
                        <td class="acciones">
                            <a th:href="@{/productos/editar/{codigoProducto}(codigoProducto=${producto.codigoProducto})}"
                               class="btn btn-outline-warning btn-sm">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <a th:href="@{/productos/eliminar/{codigoProducto}(codigoProducto=${producto.codigoProducto})}"
                               class="btn btn-outline-danger btn-sm"
                               onclick="return confirm('¿Eliminar este producto?')">
                                <i class="bi bi-trash"></i> Eliminar
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>

</html>
