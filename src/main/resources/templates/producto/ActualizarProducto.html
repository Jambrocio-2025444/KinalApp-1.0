<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/menu :: main}">

<th:block th:fragment="content">
    <div class="page-header">
        <h2><i class="bi bi-pencil-square"></i> Editar Producto</h2>
        <a href="/productos" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Volver
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/productos/actualizar/{codigoProducto}(codigoProducto=${producto.codigoProducto})}"
                  method="post"
                  th:object="${producto}">

                <div class="form-group">
                    <label>Código:</label>
                    <input type="text" th:value="*{codigoProducto}" class="form-control" readonly disabled>
                    <input type="hidden" name="codigoProducto" th:value="*{codigoProducto}">
                </div>

                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" name="nombreProducto" th:value="*{nombreProducto}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Precio:</label>
                    <input type="number" step="0.01" name="precio" th:value="*{precio}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Stock:</label>
                    <input type="number" name="stock" th:value="*{stock}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Estado:</label>
                    <select name="estado" class="form-control">
                        <option value="1" th:selected="*{estado == 1}"> Activo</option>
                        <option value="0" th:selected="*{estado == 0}"> Inactivo</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Actualizar
                    </button>
                    <a href="/productos" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</th:block>

</html>
