<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/menu :: main}">

<th:block th:fragment="content">
    <div class="page-header">
        <h2><i class="bi bi-check-circle"></i> Usuarios Activos</h2>
        <a href="/usuarios" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Todos los usuarios
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Código</th>
                        <th>Username</th>
                        <th>Password</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.codigoUsuario}">Código</td>
                        <td th:text="${usuario.username}">Username</td>
                        <td>••••••••</td>
                        <td><span class="badge bg-info" th:text="${usuario.rol}">rol</span></td>
                        <td><span class="badge bg-success">Activo</span></td>
                        <td class="acciones">
                            <a th:href="@{/usuarios/editar/{codigoUsuario}(codigoUsuario=${usuario.codigoUsuario})}"
                               class="btn btn-outline-warning btn-sm">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <a th:href="@{/usuarios/eliminar/{codigoUsuario}(codigoUsuario=${usuario.codigoUsuario})}"
                               class="btn btn-outline-danger btn-sm"
                               onclick="return confirm('¿Eliminar este usuario?')">
                                <i class="bi bi-trash"></i> Eliminar
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>

</html>
