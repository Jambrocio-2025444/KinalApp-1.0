<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/menu :: main}">

<th:block th:fragment="content">
    <div class="page-header">
        <h2><i class="bi bi-pencil-square"></i> Editar Usuario</h2>
        <a href="/usuarios" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Volver
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/usuarios/actualizar/{codigoUsuario}(codigoUsuario=${usuarios.codigoUsuario})}"
                  method="post"
                  th:object="${usuarios}">

                <div class="form-group">
                    <label>Código:</label>
                    <input type="text" th:value="*{codigoUsuario}" class="form-control" readonly disabled>
                    <input type="hidden" name="codigoUsuario" th:value="*{codigoUsuario}">
                </div>

                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" name="username" th:value="*{username}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" name="password" class="form-control" placeholder="Dejar en blanco para no cambiar">
                </div>

                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" name="email" th:value="*{email}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Rol:</label>
                    <select name="rol" class="form-control" required>
                        <option value="ADMIN" th:selected="*{rol == 'ADMIN'}">Administrador</option>
                        <option value="USER" th:selected="*{rol == 'USER'}">Usuario</option>
                        <option value="GUEST" th:selected="*{rol == 'GUEST'}">Invitado</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Estado:</label>
                    <select name="estado" class="form-control">
                        <option value="1" th:selected="*{estado == 1}"> Activo</option>
                        <option value="0" th:selected="*{estado == 0}"> Inactivo</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Actualizar
                    </button>
                    <a href="/usuarios" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</th:block>

</html>
