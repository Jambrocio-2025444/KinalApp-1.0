<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/menu :: main}">

<th:block th:fragment="content">
    <div class="page-header">
        <h2><i class="bi bi-search"></i> Resultado de Búsqueda</h2>
        <div>
            <a href="/clientes" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
            <a href="/clientes/BuscarCliente" class="btn btn-primary">
                <i class="bi bi-search"></i> Nueva Búsqueda
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div th:if="${encontrado == true}">
                <h3 class="text-success mb-3">
                    <i class="bi bi-check-circle-fill"></i> Cliente encontrado:
                </h3>
                <div class="table-responsive">
                    <table class="table">
                        <tbody>
                        <tr>
                            <th width="150">DPI:</th>
                            <td th:text="${cliente.DPICliente}">—</td>
                        </tr>
                        <tr>
                            <th>Nombre:</th>
                            <td th:text="${cliente.nombreCliente}">—</td>
                        </tr>
                        <tr>
                            <th>Apellido:</th>
                            <td th:text="${cliente.apellidoCliente}">—</td>
                        </tr>
                        <tr>
                            <th>Estado:</th>
                            <td>
                                <span th:if="${cliente.estado == 1}" class="badge bg-success">Activo</span>
                                <span th:unless="${cliente.estado == 1}" class="badge bg-danger">Inactivo</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="form-actions">
                    <div sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/clientes/editar/{dpi}(dpi=${cliente.DPICliente})}" class="btn btn-warning">
                        <i class="bi bi-pencil"></i> Editar
                    </a>
                    <a th:href="@{/clientes/eliminar/{dpi}(dpi=${cliente.DPICliente})}"
                       class="btn btn-danger"
                       onclick="return confirm('¿Eliminar este cliente?')">
                        <i class="bi bi-trash"></i> Eliminar
                    </a>
                    </div>
                    <div sec:authorize="!hasRole('ADMIN')">
                        <span class="text-muted">Sin permisos</span>
                    </div>
                </div>
            </div>

            <div th:if="${encontrado == false}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${mensaje}"></span>
            </div>
        </div>
    </div>
</th:block>

</html>
