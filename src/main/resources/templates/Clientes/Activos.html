<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/menu :: main}">

<th:block th:fragment="content">
    <div class="page-header">
        <h2><i class="bi bi-check-circle"></i> Clientes Activos</h2>
        <a href="/clientes" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Todos los clientes
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr>
                        <th>DPI</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Dirección</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cliente : ${clientes}">
                        <td th:text="${cliente.DPICliente}">DPI</td>
                        <td th:text="${cliente.nombreCliente}">Nombre</td>
                        <td th:text="${cliente.apellidoCliente}">Apellido</td>
                        <td th:text="${cliente.direccion}">Dirección</td>
                        <td><span class="badge bg-success">Activo</span></td>
                        <td class="acciones">
                            <a th:href="@{/clientes/editar/{dpi}(dpi=${cliente.DPICliente})}" class="btn btn-outline-warning btn-sm">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <a th:href="@{/clientes/eliminar/{dpi}(dpi=${cliente.DPICliente})}"
                               class="btn btn-outline-danger btn-sm"
                               onclick="return confirm('¿Eliminar este cliente?')">
                                <i class="bi bi-trash"></i> Eliminar
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>

</html>
