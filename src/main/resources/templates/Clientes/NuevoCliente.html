<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/menu :: main}">

<th:block th:fragment="content">
  <div class="page-header">
    <h2><i class="bi bi-plus-circle"></i> Nuevo Cliente</h2>
    <a href="/clientes" class="btn btn-secondary">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
  </div>

  <div class="card">
    <div class="card-body">
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <form action="/clientes/guardar" method="post">
        <div class="form-group">
          <label>DPI:</label>
          <input type="text" name="DPICliente" class="form-control" required>
        </div>

        <div class="form-group">
          <label>Nombre:</label>
          <input type="text" name="nombreCliente" class="form-control" required>
        </div>

        <div class="form-group">
          <label>Apellido:</label>
          <input type="text" name="apellidoCliente" class="form-control" required>
        </div>

        <div class="form-group">
          <label>Dirección:</label>
          <input type="text" name="direccion" class="form-control" required>
        </div>

        <div class="form-group">
          <label>Estado:</label>
          <select name="estado" class="form-control">
            <option value="1">Activo</option>
            <option value="0">Inactivo</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save"></i> Guardar
          </button>
          <a href="/clientes" class="btn btn-secondary">
            <i class="bi bi-x-circle"></i> Cancelar
          </a>
        </div>
      </form>
    </div>
  </div>
</th:block>

</html>
