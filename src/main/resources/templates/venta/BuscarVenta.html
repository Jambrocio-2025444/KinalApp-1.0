<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/menu :: main}">

<th:block th:fragment="content">
  <div class="page-header">
    <h2><i class="bi bi-search"></i> Buscar Venta por Código</h2>
    <a href="/ventas" class="btn btn-secondary">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
  </div>

  <div class="card">
    <div class="card-body">
      <form action="/ventas/buscar" method="get">
        <div class="form-group">
          <label for="codigoVenta">Ingrese el código de la venta:</label>
          <input type="number"
                 id="codigoVenta"
                 name="codigoVenta"
                 class="form-control"
                 required
                 placeholder="Ej: 1">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-search"></i> Buscar
          </button>
        </div>
      </form>
    </div>
  </div>
</th:block>

</html>
