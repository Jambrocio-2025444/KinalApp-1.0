<div th:fragment="main">
  <head>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  </head>

  <div class="kinal-layout">
    <aside class="kinal-sidebar">
      <div class="sidebar-header">
        <img th:src="@{/images/logo.png}" alt="Logo" class="sidebar-logo">
        <h4 class="app-title">KinalApp</h4>
      </div>
      <nav class="sidebar-nav">
        <a href="/"><i class="bi bi-house-door me-2"></i> Dashboard</a>
        <a href="/clientes"><i class="bi bi-people me-2"></i> Clientes</a>
        <a href="/usuarios"><i class="bi bi-person me-2"></i> Usuarios</a>
        <a href="/productos"><i class="bi bi-box me-2"></i> Productos</a>
        <a href="/ventas"><i class="bi bi-currency-dollar me-2"></i> Ventas</a>
        <a href="/detalles"><i class="bi bi-list-check me-2"></i> Detalles</a>
        <hr class="sidebar-divider">
        <a href="/logout" class="logout-link"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
      </nav>
    </aside>

    <main class="kinal-main">
      <div class="container-fluid py-4">
        <div th:replace="~{::content}"></div>
      </div>
    </main>
  </div>
</div>
