<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acceso Denegado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0B2D3F, #05161f);
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            text-align: center;
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: #F27420;
        }
        .btn-primary {
            background-color: #F27420;
            border: none;
            padding: 10px 25px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg p-4">
                <div class="error-code">403</div>
                <h3 class="mb-3">Acceso Denegado</h3>
                <p class="mb-4">No tienes permisos suficientes para acceder a esta página.</p>
                <p class="mb-4">Tu rol actual no tiene autorización.</p>
                <a href="/" class="btn btn-primary">← Volver al Inicio</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
